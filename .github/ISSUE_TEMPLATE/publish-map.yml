name: Publish New Map
description: Submit a new custom map to The Railyard registry.
title: "[Publish Map]: "
labels: ["publish-map"]
body:
  - type: markdown
    attributes:
      value: |
        ## Publish a New Map

        Fill out the form below to submit your custom map to The Railyard. A pull request will be automatically created for review.

        If validation fails, you can edit this issue and comment **revalidate** to retry.

  - type: input
    id: map-id
    attributes:
      label: Map ID
      description: >
        A unique identifier for your map in kebab-case. This is the permanent directory name in the registry
        and cannot be changed later. Must be unique across all maps — if another map of the same city already
        exists, use a distinct ID (e.g. `london-detailed`, `london-mini`).
        Only lowercase letters, numbers, and hyphens allowed.
      placeholder: raleigh
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: City Name
      description: The human-readable city name shown in the mod manager.
      placeholder: Raleigh
    validations:
      required: true

  - type: input
    id: city-code
    attributes:
      label: City Code
      description: >
        2-4 letter IATA/ICAO-style city code used by the game internally. Must be uppercase letters/numbers.
        Must not clash with vanilla city codes or other registered maps.
        Check existing maps before choosing a code.
      placeholder: RDU
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country Code
      description: >
        ISO 3166-1 alpha-2 country code — two uppercase letters (e.g. US, GB, CA, DE, JP).
        Used to group maps by country in the mod manager.
      placeholder: US
    validations:
      required: true

  - type: input
    id: population
    attributes:
      label: Population
      description: >
        Approximate metropolitan area population. Number only, no commas or separators.
        Used for display and sorting in the mod manager — doesn't need to be exact.
      placeholder: "1500000"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A short description of your map. Mention data quality, notable features, or coverage area.
      placeholder: Custom map of the Raleigh-Durham metropolitan area with good demand data quality.
    validations:
      required: true

  - type: checkboxes
    id: tags
    attributes:
      label: Tags
      description: Select all tags that apply to your map. These help users find your map in the browser.
      options:
        - label: caribbean
        - label: central-america
        - label: central-asia
        - label: east-africa
        - label: east-asia
        - label: europe
        - label: middle-east
        - label: north-africa
        - label: north-america
        - label: oceania
        - label: south-america
        - label: south-asia
        - label: southeast-asia
        - label: southern-africa
        - label: west-africa
        - label: full-detail
        - label: high-detail
        - label: medium-detail
        - label: low-detail
        - label: airports
        - label: entertainment
        - label: ferries
        - label: highways
        - label: universities

  - type: input
    id: source
    attributes:
      label: Source URL
      description: URL to your map's source code repository or download page.
      placeholder: https://github.com/username/sb-raleigh
    validations:
      required: true

  - type: dropdown
    id: update-type
    attributes:
      label: Update Type
      description: >
        How should the mod manager fetch updates for your map?
        Most maps should use GitHub Releases. Use Custom URL only if you host your own update.json file.
      options:
        - GitHub Releases
        - Custom URL
    validations:
      required: true

  - type: input
    id: github-repo
    attributes:
      label: GitHub Repository
      description: >
        Required if using GitHub Releases. The `owner/repo` path (e.g. `username/sb-raleigh`).
        The repo must exist, have at least one release, and the latest release must contain a .zip asset.
        Leave blank if using Custom URL.
      placeholder: username/sb-raleigh

  - type: input
    id: custom-update-url
    attributes:
      label: Custom Update URL
      description: >
        Required if using Custom URL. The full URL to your self-hosted update.json file.
        The file must follow The Railyard update.json schema (see docs).
        Leave blank if using GitHub Releases.
      placeholder: https://example.com/sb-raleigh/update.json

  - type: textarea
    id: gallery
    attributes:
      label: Gallery Images
      description: >
        Drag and drop screenshots here, or paste image URLs (one per line).
        These will be displayed in the map browser. At least one image is recommended.

  - type: checkboxes
    id: terms
    attributes:
      label: Terms
      options:
        - label: I confirm I am the author or have permission to publish this map.
          required: true
