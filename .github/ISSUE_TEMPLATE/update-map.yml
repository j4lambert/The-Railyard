name: Update Existing Map Metadata
description: Update metadata for a map you own in The Railyard registry.
title: "[Update Map]: "
labels: ["update-map"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update Map Metadata

        Only fill in the fields you want to change — leave everything else blank.
        Your GitHub account must match the original publisher of this map.

        If validation fails, you can edit this issue and comment **revalidate** to retry.

  - type: input
    id: map-id
    attributes:
      label: Map ID
      description: The ID of the map you want to update. Must already exist in the registry.
      placeholder: raleigh
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: City Name
      description: New city name (leave blank to keep current).

  - type: input
    id: city-code
    attributes:
      label: City Code
      description: >
        New city code. Must not clash with vanilla city codes or other registered maps.
        Leave blank to keep current.

  - type: input
    id: country
    attributes:
      label: Country Code
      description: New ISO 3166-1 alpha-2 country code (leave blank to keep current).

  - type: input
    id: population
    attributes:
      label: Population
      description: New metropolitan area population, number only (leave blank to keep current).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: New description (leave blank to keep current).

  - type: checkboxes
    id: tags
    attributes:
      label: Tags
      description: >
        If you check any tags below, they will REPLACE all current tags.
        Leave all unchecked to keep current tags.
      options:
        - label: caribbean
        - label: central-america
        - label: central-asia
        - label: east-africa
        - label: east-asia
        - label: europe
        - label: middle-east
        - label: north-africa
        - label: north-america
        - label: oceania
        - label: south-america
        - label: south-asia
        - label: southeast-asia
        - label: southern-africa
        - label: west-africa
        - label: full-detail
        - label: high-detail
        - label: medium-detail
        - label: low-detail
        - label: airports
        - label: entertainment
        - label: ferries
        - label: highways
        - label: universities

  - type: input
    id: source
    attributes:
      label: Source URL
      description: New source URL (leave blank to keep current).

  - type: dropdown
    id: update-type
    attributes:
      label: Update Type
      description: Change the update type, or select "No change" to keep current.
      options:
        - No change
        - GitHub Releases
        - Custom URL

  - type: input
    id: github-repo
    attributes:
      label: GitHub Repository
      description: >
        New `owner/repo` path. The repo must exist and have at least one release with a .zip asset.
        Leave blank to keep current.

  - type: input
    id: custom-update-url
    attributes:
      label: Custom Update URL
      description: >
        New custom update.json URL. Must follow The Railyard update.json schema.
        Leave blank to keep current.

  - type: textarea
    id: gallery
    attributes:
      label: Gallery Images
      description: >
        Drag and drop new screenshots here, or paste image URLs (one per line).
        If provided, these will REPLACE the current gallery. Leave blank to keep current.
