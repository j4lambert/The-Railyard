# AUTO-GENERATED by scripts/generate-map-templates.ts. Do not edit directly.
"name": "Update Existing Map Metadata"
"description": "Update metadata for a map you own in The Railyard registry."
"title": "[Update Map]: "
"labels":
  - "update-map"
"body":
  - "type": "markdown"
    "attributes":
      "value": "# Update Map Metadata


        Only fill in the fields you want to change - leave everything else blank.

        Your GitHub account must match the original publisher of this map.


        If validation fails, you can edit this issue and comment **revalidate** to retry."
  - "type": "markdown"
    "attributes":
      "value": "<br>"
  - "type": "markdown"
    "attributes":
      "value": "## Identifiers


        Provide details about the city/metropolitan area your map models. These data will be
        used to import your map into the game and to give Railyard users context abour your
        map"
  - "type": "input"
    "id": "map-id"
    "attributes":
      "label": "Map ID"
      "description": "The ID of the map you want to update. Must already exist in the registry."
      "placeholder": "raleigh"
    "validations":
      "required": true
  - "type": "input"
    "id": "name"
    "attributes":
      "label": "City Name"
      "description": "The human-readable city name shown in Railyard. This is the title of the map
        that people will see when downloading it."
      "placeholder": "Raleigh"
    "validations":
      "required": true
  - "type": "input"
    "id": "city-code"
    "attributes":
      "label": "City Code"
      "description": "2-4 letter IATA/ICAO-style city code used by the game internally. Must be
        uppercase letters/numbers. Must not clash with vanilla city codes or other
        registered maps. Check existing maps before choosing a code."
      "placeholder": "RDU"
    "validations":
      "required": true
  - "type": "input"
    "id": "country"
    "attributes":
      "label": "Country Code"
      "description": "ISO 3166-1 alpha-2 country code - two uppercase letters (e.g. US, GB, CA,
        DE, JP). Used to group maps by country in Railyard. It is REQUIRED that you use ISO
        codes according to this list:
        https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes."
      "placeholder": "US"
    "validations":
      "required": true
  - "type": "input"
    "id": "population"
    "attributes":
      "label": "Population"
      "description": "Approximate metropolitan area population. Number only, no commas or
        separators. Used for display and sorting in Railyard and does not need to be exact."
      "placeholder": "1500000"
    "validations":
      "required": true
  - "type": "textarea"
    "id": "description"
    "attributes":
      "label": "Description"
      "description": "A short description of what your map offers. Markdown is supported. This is
        shown in the map browser. Mention data quality, notable features, or coverage area."
      "render": "markdown"
      "placeholder": "Custom map of the Raleigh-Durham metropolitan area with good demand data quality."
    "validations":
      "required": true
  - "type": "markdown"
    "attributes":
      "value": "<br>"
  - "type": "markdown"
    "attributes":
      "value": "## Data Attestation


        Provide details about your map's data source, data source quality, and level of
        detail. Be honest and transparent in your descriptions and please include the
        methodology you used to generate the map's data."
  - "type": "input"
    "id": "data_source"
    "attributes":
      "label": "Data Source"
      "description": "Enter the data source used to generate the demand data for your map. The
        source name should use common abbreviations like LODES/INSEE/ONS etc."
      "placeholder": "LODES, etc."
      "value": "OSM"
    "validations":
      "required": false
  - "type": "dropdown"
    "id": "source_quality"
    "attributes":
      "label": "Source Quality"
      "description": "Approximate quality of the data source used for your map. Official gov't
        sources are considered high-quality while raw open-source data is considered
        low-quality. If your data source includes OSM, we will not consider that
        high-quality data."
      "options":
        - "low-quality"
        - "medium-quality"
        - "high-quality"
    "validations":
      "required": true
  - "type": "dropdown"
    "id": "level_of_detail"
    "attributes":
      "label": "Level of Detail"
      "description": "Approximate level of detail of your map. Demand resolution at the level of
        census blocks is considered high-detail, while neighborhood/city resolutions are
        considered low-detail."
      "options":
        - "low-detail"
        - "medium-detail"
        - "high-detail"
    "validations":
      "required": true
  - "type": "input"
    "id": "methodology"
    "attributes":
      "label": "Methodology"
      "description": "Description of how demand data was generated for your map. Please include
        any details about overcoming data source limitations or any augmentations done with
        real-world data."
      "placeholder": "Transcribed raw OSM data"
    "validations":
      "required": true
  - "type": "markdown"
    "attributes":
      "value": "<br>"
  - "type": "markdown"
    "attributes":
      "value": "## Tagging & Image Preview


        Railyard allows users to search for maps based on tags and presents a preview image
        for discovery. Please check whichever tags best represent your map. Note that
        `Location` is required."
  - "type": "dropdown"
    "id": "location"
    "attributes":
      "label": "Location"
      "description": "Select all tags that apply to your map. These help users find your map in
        the browser."
      "options":
        - "caribbean"
        - "central-america"
        - "central-asia"
        - "east-africa"
        - "east-asia"
        - "europe"
        - "middle-east"
        - "north-africa"
        - "north-america"
        - "oceania"
        - "south-america"
        - "south-asia"
        - "southeast-asia"
        - "southern-africa"
        - "west-africa"
    "validations":
      "required": true
  - "type": "markdown"
    "attributes":
      "value": "<br>"
  - "type": "markdown"
    "attributes":
      "value": "### Special Demand Tag Guide


        Use these tags only when the map models a meaningful amount of demand related to the
        feature.


        - `airports`: passenger (non-worker) demand from major airports

        - `entertainment`: leisure/tourist demand at stadiums/venues/nightlife

        - `ferries`: passenger (non-worker) demand from ferry terminals

        - `hospitals`: visitation demand for major medical centers

        - `parks`: leisure/tourist demand from large local or national parks

        - `schools`: demand from primary/secondary school students

        - `universities`: demand from university school students"
  - "type": "checkboxes"
    "id": "special_demand"
    "attributes":
      "label": "Special Demand"
      "description": "Select all tags that apply to your map. These help users find your map in
        the browser."
      "options":
        - "label": "airports"
        - "label": "entertainment"
        - "label": "ferries"
        - "label": "hospitals"
        - "label": "parks"
        - "label": "schools"
        - "label": "universities"
  - "type": "textarea"
    "id": "gallery"
    "attributes":
      "label": "Gallery Images"
      "description": "Drag and drop screenshots here, or paste image URLs (one per line). These
        will be displayed in the map browser. At least one image is required."
    "validations":
      "required": true
  - "type": "markdown"
    "attributes":
      "value": "<br>"
  - "type": "markdown"
    "attributes":
      "value": "## Source Code Information


        Provide information on where your map is hosted so that Railyard will be able to
        check your repository for updates and allow users to install the map on demand."
  - "type": "input"
    "id": "source"
    "attributes":
      "label": "Source URL"
      "description": "URL to your map's source code repository or download page."
      "placeholder": "https://github.com/username/sb-raleigh"
    "validations":
      "required": true
  - "type": "dropdown"
    "id": "update-type"
    "attributes":
      "label": "Update Type"
      "description": "The method used by Railyard to fetch updates for your map. Most maps should
        use GitHub Releases. Use Custom URL only if you host your own update.json file."
      "options":
        - "GitHub Releases"
        - "Custom URL"
    "validations":
      "required": true
  - "type": "input"
    "id": "github-repo"
    "attributes":
      "label": "GitHub Repository"
      "description": "Required ONLY if you selected GitHub Releases. The `owner/repo` path (e.g.
        `username/sb-raleigh`). The repo must exist, have at least one release, and the
        latest release must contain a .zip asset. Leave blank if using Custom URL."
      "placeholder": "username/sb-raleigh"
  - "type": "input"
    "id": "custom-update-url"
    "attributes":
      "label": "Custom Update URL"
      "description": "Required ONLY if you selected Custom URL. The full URL to your self-hosted
        update.json file. The file must follow the Railyard update.json schema. Leave blank
        if using GitHub Releases."
      "placeholder": "https://example.com/sb-raleigh/update.json"
  - "type": "markdown"
    "attributes":
      "value": "<br>"
  - "type": "markdown"
    "attributes":
      "value": "## Authorization."
  - "type": "checkboxes"
    "id": "terms"
    "attributes":
      "label": "Terms"
      "options":
        - "label": "I attest that I am the author or this map or have been granted permission by the
            author to publish this map to Railyard."
          "required": true
