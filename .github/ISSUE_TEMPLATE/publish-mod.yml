name: Publish New Mod
description: Submit a new mod to The Railyard registry.
title: "[Publish Mod]: "
labels: ["publish-mod"]
body:
  - type: markdown
    attributes:
      value: |
        ## Publish a New Mod

        Fill out the form below to submit your mod to The Railyard. A pull request will be automatically created for review.

        If validation fails, you can edit this issue and comment **revalidate** to retry.

  - type: input
    id: mod-id
    attributes:
      label: Mod ID
      description: >
        A unique identifier for your mod in kebab-case. This is the permanent directory name in the registry
        and cannot be changed later. Must be unique across all mods — check existing listings before submitting.
        Only lowercase letters, numbers, and hyphens allowed.
      placeholder: better-trains
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Display Name
      description: The human-readable name shown in the mod manager.
      placeholder: Better Trains
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A short description of what your mod does. This is shown in the mod browser.
      placeholder: Adds realistic train models with improved sounds and animations.
    validations:
      required: true

  - type: checkboxes
    id: tags
    attributes:
      label: Tags
      description: Select all tags that apply to your mod. These help users find your mod in the browser.
      options:
        - label: cosmetic
        - label: gameplay
        - label: library
        - label: misc
        - label: qol
        - label: stations
        - label: tracks
        - label: trains
        - label: ui

  - type: input
    id: source
    attributes:
      label: Source URL
      description: URL to your mod's source code repository or homepage.
      placeholder: https://github.com/username/better-trains
    validations:
      required: true

  - type: dropdown
    id: update-type
    attributes:
      label: Update Type
      description: >
        How should the mod manager fetch updates for your mod?
        Most mods should use GitHub Releases. Use Custom URL only if you host your own update.json file.
      options:
        - GitHub Releases
        - Custom URL
    validations:
      required: true

  - type: input
    id: github-repo
    attributes:
      label: GitHub Repository
      description: >
        Required if using GitHub Releases. The `owner/repo` path (e.g. `username/better-trains`).
        The repo must exist, have at least one release, and the latest release must contain a .zip asset.
        Leave blank if using Custom URL.
      placeholder: username/better-trains

  - type: input
    id: custom-update-url
    attributes:
      label: Custom Update URL
      description: >
        Required if using Custom URL. The full URL to your self-hosted update.json file.
        The file must follow The Railyard update.json schema (see docs).
        Leave blank if using GitHub Releases.
      placeholder: https://example.com/better-trains/update.json

  - type: textarea
    id: gallery
    attributes:
      label: Gallery Images
      description: >
        Drag and drop screenshots here, or paste image URLs (one per line).
        These will be displayed in the mod browser. At least one image is recommended.

  - type: checkboxes
    id: terms
    attributes:
      label: Terms
      options:
        - label: I confirm I am the author or have permission to publish this mod.
          required: true
