name: Update Existing Mod Metadata
description: Update metadata for a mod you own in The Railyard registry.
title: "[Update Mod]: "
labels: ["update-mod"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update Mod Metadata

        Only fill in the fields you want to change. Leave everything else blank.
        Your GitHub account must match the original publisher of this mod.

  - type: input
    id: mod-id
    attributes:
      label: Mod ID
      description: The ID of the mod you want to update (must already exist in the registry).
      placeholder: my-awesome-mod
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Display Name
      description: New display name (leave blank to keep current).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: New description (leave blank to keep current).

  - type: checkboxes
    id: tags
    attributes:
      label: Tags
      description: >
        If you check any tags below, they will REPLACE the current tags.
        Leave all unchecked to keep current tags.
      options:
        - label: vehicles
        - label: cosmetic
        - label: gameplay
        - label: ui
        - label: audio
        - label: maps
        - label: tools
        - label: library

  - type: input
    id: source
    attributes:
      label: Source URL
      description: New source URL (leave blank to keep current).

  - type: dropdown
    id: update-type
    attributes:
      label: Update Type
      description: Change the update type (select "No change" to keep current).
      options:
        - No change
        - GitHub Releases
        - Custom URL

  - type: input
    id: github-repo
    attributes:
      label: GitHub Repository
      description: New `owner/repo` path (leave blank to keep current).

  - type: input
    id: custom-update-url
    attributes:
      label: Custom Update URL
      description: New custom update URL (leave blank to keep current).

  - type: textarea
    id: gallery
    attributes:
      label: Gallery Images
      description: >
        Drag and drop new screenshot images here, or paste image URLs (one per line).
        If provided, these will REPLACE the current gallery.
