name: Regenerate Indexes

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Regenerate index files
        run: pnpm --dir scripts run regenerate-indexes

      - name: Stage index changes
        id: stage_changes
        run: |
          git add mods/index.json maps/index.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update bot PR
        id: create_pr
        if: ${{ steps.stage_changes.outputs.has_changes == 'true' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate index files"
          branch: bot/regenerate-indexes
          delete-branch: true
          title: "chore: regenerate index files"
          body: "Automated update from regenerate-index workflow."

      - name: Resolve bot PR outputs with retries
        id: resolve_pr
        if: ${{ steps.stage_changes.outputs.has_changes == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          retry_cmd() {
            local max_attempts="$1"
            shift
            local delay=5
            local attempt=1
            local output=""
            while true; do
              if output="$("$@" 2>&1)"; then
                printf '%s' "$output"
                return 0
              fi
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "$output" >&2
                return "$status"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed for: $*" >&2
              echo "$output" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          PR_NUMBER="${{ steps.create_pr.outputs.pull-request-number }}"
          PR_URL="${{ steps.create_pr.outputs.pull-request-url }}"
          PR_HEAD_SHA="${{ steps.create_pr.outputs.pull-request-head-sha }}"
          BOT_BRANCH="bot/regenerate-indexes"

          if [ -z "${PR_NUMBER}" ]; then
            PR_LIST_JSON="$(retry_cmd 5 gh pr list --repo "${{ github.repository }}" --head "${BOT_BRANCH}" --state open --json number,url,headRefOid --limit 1)"
            PR_NUMBER="$(echo "${PR_LIST_JSON}" | jq -r '.[0].number // empty')"
            PR_URL="$(echo "${PR_LIST_JSON}" | jq -r '.[0].url // empty')"
            PR_HEAD_SHA="$(echo "${PR_LIST_JSON}" | jq -r '.[0].headRefOid // empty')"
          fi

          if [ -z "${PR_NUMBER}" ]; then
            echo "Unable to resolve PR number for branch '${BOT_BRANCH}'." >&2
            exit 1
          fi

          if [ -z "${PR_URL}" ] || [ -z "${PR_HEAD_SHA}" ]; then
            PR_VIEW_JSON="$(retry_cmd 5 gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json url,headRefOid)"
            PR_URL="${PR_URL:-$(echo "${PR_VIEW_JSON}" | jq -r '.url // empty')}"
            PR_HEAD_SHA="${PR_HEAD_SHA:-$(echo "${PR_VIEW_JSON}" | jq -r '.headRefOid // empty')}"
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Apply automation label with retries
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          retry_run() {
            local max_attempts="$1"
            shift
            local delay=5
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed for: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          retry_run 5 gh pr edit "${{ steps.resolve_pr.outputs.pr_number }}" --repo "${{ github.repository }}" --add-label automation

      - name: Request approval bot review
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          retry_run() {
            local max_attempts="$1"
            shift
            local delay=5
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed for: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          retry_run 5 gh api repos/${{ github.repository }}/dispatches \
            -f event_type='auto-approve-actions-bot-pr' \
            -f client_payload[pull_request_number]="${{ steps.resolve_pr.outputs.pr_number }}" \
            -f client_payload[source_workflow]="${{ github.workflow }}" \
            -f client_payload[source_run_id]="${{ github.run_id }}"

      - name: Enable PR auto-merge
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          retry_run() {
            local max_attempts="$1"
            shift
            local delay=5
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed for: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          retry_run 5 gh pr merge "${{ steps.resolve_pr.outputs.pr_number }}" --repo "${{ github.repository }}" --auto --squash \
            || echo "Could not enable auto-merge after retries (auto-merge may be disabled or blocked by branch rules)."

      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          script: |
            const prefixes = ['publish/mod/', 'publish/map/', 'update/mod/', 'update/map/'];
            const { data: branches } = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const branch of branches) {
              if (!prefixes.some(p => branch.name.startsWith(p))) continue;
              // Only delete if there's no open PR for this branch
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch.name}`,
                state: 'open'
              });
              if (prs.length === 0) {
                console.log(`Deleting stale branch: ${branch.name}`);
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch.name}`
                });
              }
            }
