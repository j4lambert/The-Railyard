name: Regenerate Indexes

on:
  push:
    branches: [main]
    paths:
      - "mods/*/manifest.json"
      - "maps/*/manifest.json"

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Regenerate index files
        run: pnpm --dir scripts run regenerate-indexes

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mods/index.json maps/index.json
          git diff --cached --quiet || git commit -m "chore: regenerate index files"
          git push
