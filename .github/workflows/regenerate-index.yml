name: Regenerate Indexes

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Regenerate index files
        run: pnpm --dir scripts run regenerate-indexes

      - name: Stage index changes
        id: stage_changes
        run: |
          git add mods/index.json maps/index.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update bot PR
        id: create_pr
        if: ${{ steps.stage_changes.outputs.has_changes == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate index files"
          branch: bot/regenerate-indexes
          delete-branch: true
          title: "chore: regenerate index files"
          body: "Automated update from regenerate-index workflow."
          labels: automation

      - name: Enable PR auto-merge
        if: ${{ steps.create_pr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ steps.create_pr.outputs.pull-request-number }}" --approve \
            || echo "Could not auto-approve (ensure 'Allow GitHub Actions to create and approve pull requests' is enabled)."
          gh pr merge "${{ steps.create_pr.outputs.pull-request-number }}" --auto --squash \
            || echo "Could not enable auto-merge (auto-merge may be disabled or blocked by branch rules)."

      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          script: |
            const prefixes = ['publish/mod/', 'publish/map/', 'update/mod/', 'update/map/'];
            const { data: branches } = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const branch of branches) {
              if (!prefixes.some(p => branch.name.startsWith(p))) continue;
              // Only delete if there's no open PR for this branch
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch.name}`,
                state: 'open'
              });
              if (prs.length === 0) {
                console.log(`Deleting stale branch: ${branch.name}`);
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch.name}`
                });
              }
            }
