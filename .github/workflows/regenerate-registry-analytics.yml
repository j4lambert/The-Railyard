name: Regenerate Registry Analytics (Full)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      force_demand_stats:
        description: Force refresh all map demand stats (ignore cache)
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: regenerate-registry-analytics
  cancel-in-progress: false

jobs:
  generate-maps:
    runs-on: ubuntu-latest
    outputs:
      warnings_json: ${{ steps.generate_map_analytics.outputs.warnings_json }}
      warning_count: ${{ steps.generate_map_analytics.outputs.warning_count }}
      registry_fetches_added: ${{ steps.generate_map_analytics.outputs.registry_fetches_added }}
      adjusted_delta_total: ${{ steps.generate_map_analytics.outputs.adjusted_delta_total }}
      clamped_versions: ${{ steps.generate_map_analytics.outputs.clamped_versions }}
      integrity_listings: ${{ steps.generate_map_analytics.outputs.integrity_listings }}
      integrity_versions_checked: ${{ steps.generate_map_analytics.outputs.integrity_versions_checked }}
      integrity_complete_versions: ${{ steps.generate_map_analytics.outputs.integrity_complete_versions }}
      integrity_incomplete_versions: ${{ steps.generate_map_analytics.outputs.integrity_incomplete_versions }}
      integrity_filtered_versions: ${{ steps.generate_map_analytics.outputs.integrity_filtered_versions }}
      integrity_cache_hits: ${{ steps.generate_map_analytics.outputs.integrity_cache_hits }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Generate map registry analytics
        id: generate_map_analytics
        env:
          DISCORD_ANNOUNCEMENT_WEBHOOK_URL: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --dir scripts run generate-registry-analytics:maps -- --strict-fingerprint-cache

      - name: Upload map downloads artifact
        uses: actions/upload-artifact@v4
        with:
          name: maps-downloads
          path: |
            maps/downloads.json
            maps/integrity.json
            maps/integrity-cache.json
            maps/download-attribution-delta.json
          if-no-files-found: error

  generate-mods:
    runs-on: ubuntu-latest
    outputs:
      warnings_json: ${{ steps.generate_mod_analytics.outputs.warnings_json }}
      warning_count: ${{ steps.generate_mod_analytics.outputs.warning_count }}
      security_error_count: ${{ steps.generate_mod_analytics.outputs.security_error_count }}
      security_warning_count: ${{ steps.generate_mod_analytics.outputs.security_warning_count }}
      security_errors_json: ${{ steps.generate_mod_analytics.outputs.security_errors_json }}
      security_warnings_json: ${{ steps.generate_mod_analytics.outputs.security_warnings_json }}
      registry_fetches_added: ${{ steps.generate_mod_analytics.outputs.registry_fetches_added }}
      adjusted_delta_total: ${{ steps.generate_mod_analytics.outputs.adjusted_delta_total }}
      clamped_versions: ${{ steps.generate_mod_analytics.outputs.clamped_versions }}
      integrity_listings: ${{ steps.generate_mod_analytics.outputs.integrity_listings }}
      integrity_versions_checked: ${{ steps.generate_mod_analytics.outputs.integrity_versions_checked }}
      integrity_complete_versions: ${{ steps.generate_mod_analytics.outputs.integrity_complete_versions }}
      integrity_incomplete_versions: ${{ steps.generate_mod_analytics.outputs.integrity_incomplete_versions }}
      integrity_filtered_versions: ${{ steps.generate_mod_analytics.outputs.integrity_filtered_versions }}
      integrity_cache_hits: ${{ steps.generate_mod_analytics.outputs.integrity_cache_hits }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Generate mod registry analytics
        id: generate_mod_analytics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_ANNOUNCEMENT_WEBHOOK_URL: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URL }}
        run: pnpm --dir scripts run generate-registry-analytics:mods -- --strict-fingerprint-cache

      - name: Upload mod downloads artifact
        uses: actions/upload-artifact@v4
        with:
          name: mods-downloads
          path: |
            mods/downloads.json
            mods/integrity.json
            mods/integrity-cache.json
            mods/download-attribution-delta.json
          if-no-files-found: error

  generate-map-demand-stats:
    runs-on: ubuntu-latest
    outputs:
      processed_maps: ${{ steps.generate_map_demand_stats.outputs.processed_maps }}
      updated_maps: ${{ steps.generate_map_demand_stats.outputs.updated_maps }}
      skipped_maps: ${{ steps.generate_map_demand_stats.outputs.skipped_maps }}
      skipped_unchanged: ${{ steps.generate_map_demand_stats.outputs.skipped_unchanged }}
      extraction_failures: ${{ steps.generate_map_demand_stats.outputs.extraction_failures }}
      residents_delta_total: ${{ steps.generate_map_demand_stats.outputs.residents_delta_total }}
      graphql_queries: ${{ steps.generate_map_demand_stats.outputs.graphql_queries }}
      graphql_total_cost: ${{ steps.generate_map_demand_stats.outputs.graphql_total_cost }}
      warnings_json: ${{ steps.generate_map_demand_stats.outputs.warnings_json }}
      attribution_fetches_added: ${{ steps.generate_map_demand_stats.outputs.attribution_fetches_added }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Generate map demand stats
        id: generate_map_demand_stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_demand_stats }}" = "true" ]; then
            pnpm --dir scripts run generate-registry-demand-stats -- --force --strict-fingerprint-cache
          else
            pnpm --dir scripts run generate-registry-demand-stats -- --strict-fingerprint-cache
          fi

      - name: Build map demand stats artifact
        run: |
          set -euo pipefail
          tar -cf /tmp/maps-demand-stats.tar maps/demand-stats-cache.json maps/*/manifest.json maps/demand-attribution-delta.json

      - name: Upload map demand stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: maps-demand-stats
          path: /tmp/maps-demand-stats.tar
          if-no-files-found: error

  commit:
    needs: [generate-maps, generate-mods, generate-map-demand-stats]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Capture baseline download snapshots
        run: |
          mkdir -p /tmp/download-baseline
          if [ -f maps/downloads.json ]; then
            cp maps/downloads.json /tmp/download-baseline/maps-downloads.json
          else
            echo '{}' > /tmp/download-baseline/maps-downloads.json
          fi
          if [ -f mods/downloads.json ]; then
            cp mods/downloads.json /tmp/download-baseline/mods-downloads.json
          else
            echo '{}' > /tmp/download-baseline/mods-downloads.json
          fi

      - name: Download map downloads artifact
        uses: actions/download-artifact@v4
        with:
          name: maps-downloads
          path: /tmp/download-artifacts/maps

      - name: Download mod downloads artifact
        uses: actions/download-artifact@v4
        with:
          name: mods-downloads
          path: /tmp/download-artifacts/mods

      - name: Download map demand stats artifact
        uses: actions/download-artifact@v4
        with:
          name: maps-demand-stats
          path: /tmp/download-artifacts/demand

      - name: Restore generated artifacts
        run: |
          set -euo pipefail
          mkdir -p maps mods

          MAP_ARTIFACT_FILE="$(find /tmp/download-artifacts/maps -type f -name downloads.json | head -n 1 || true)"
          MOD_ARTIFACT_FILE="$(find /tmp/download-artifacts/mods -type f -name downloads.json | head -n 1 || true)"
          MAP_INTEGRITY_FILE="$(find /tmp/download-artifacts/maps -type f -name integrity.json | head -n 1 || true)"
          MOD_INTEGRITY_FILE="$(find /tmp/download-artifacts/mods -type f -name integrity.json | head -n 1 || true)"
          MAP_INTEGRITY_CACHE_FILE="$(find /tmp/download-artifacts/maps -type f -name integrity-cache.json | head -n 1 || true)"
          MOD_INTEGRITY_CACHE_FILE="$(find /tmp/download-artifacts/mods -type f -name integrity-cache.json | head -n 1 || true)"
          MAP_ATTR_DELTA_FILE="$(find /tmp/download-artifacts/maps -type f -name download-attribution-delta.json | head -n 1 || true)"
          MOD_ATTR_DELTA_FILE="$(find /tmp/download-artifacts/mods -type f -name download-attribution-delta.json | head -n 1 || true)"
          DEMAND_ARTIFACT_FILE="$(find /tmp/download-artifacts/demand -type f -name maps-demand-stats.tar | head -n 1 || true)"

          if [ -z "${MAP_ARTIFACT_FILE}" ]; then
            echo "Failed to locate map downloads.json in downloaded artifact."
            exit 1
          fi
          if [ -z "${MOD_ARTIFACT_FILE}" ]; then
            echo "Failed to locate mod downloads.json in downloaded artifact."
            exit 1
          fi
          if [ -z "${MAP_INTEGRITY_FILE}" ]; then
            echo "Failed to locate map integrity.json in downloaded artifact."
            exit 1
          fi
          if [ -z "${MOD_INTEGRITY_FILE}" ]; then
            echo "Failed to locate mod integrity.json in downloaded artifact."
            exit 1
          fi
          if [ -z "${MAP_INTEGRITY_CACHE_FILE}" ]; then
            echo "Failed to locate map integrity-cache.json in downloaded artifact."
            exit 1
          fi
          if [ -z "${MOD_INTEGRITY_CACHE_FILE}" ]; then
            echo "Failed to locate mod integrity-cache.json in downloaded artifact."
            exit 1
          fi
          if [ -z "${DEMAND_ARTIFACT_FILE}" ]; then
            echo "Failed to locate map demand stats tar artifact."
            exit 1
          fi

          cp "${MAP_ARTIFACT_FILE}" maps/downloads.json
          cp "${MOD_ARTIFACT_FILE}" mods/downloads.json
          cp "${MAP_INTEGRITY_FILE}" maps/integrity.json
          cp "${MOD_INTEGRITY_FILE}" mods/integrity.json
          cp "${MAP_INTEGRITY_CACHE_FILE}" maps/integrity-cache.json
          cp "${MOD_INTEGRITY_CACHE_FILE}" mods/integrity-cache.json
          if [ -n "${MAP_ATTR_DELTA_FILE}" ]; then
            cp "${MAP_ATTR_DELTA_FILE}" maps/download-attribution-delta.json
          fi
          if [ -n "${MOD_ATTR_DELTA_FILE}" ]; then
            cp "${MOD_ATTR_DELTA_FILE}" mods/download-attribution-delta.json
          fi
          tar -xf "${DEMAND_ARTIFACT_FILE}" -C .

      - name: Merge registry download attribution ledger
        id: merge_attribution
        run: pnpm --dir scripts run merge-download-attribution

      - name: Reconcile adjusted downloads using merged attribution
        id: reconcile_downloads
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --dir scripts run reconcile-attributed-downloads -- --no-refresh-history

      - name: Sync map manifest file sizes from integrity
        run: pnpm --dir scripts run sync-map-file-sizes

      - name: Compute download change stats
        id: download_stats
        run: |
          node -e '
            const fs = require("node:fs");

            function readJson(path) {
              try {
                return JSON.parse(fs.readFileSync(path, "utf8"));
              } catch {
                return {};
              }
            }

            function toRecordMap(value) {
              const records = new Map();
              if (!value || typeof value !== "object") {
                return records;
              }
              for (const [listingId, versions] of Object.entries(value)) {
                if (!versions || typeof versions !== "object") {
                  continue;
                }
                for (const [version, count] of Object.entries(versions)) {
                  if (typeof count !== "number" || Number.isNaN(count)) {
                    continue;
                  }
                  records.set(`${listingId}@@${version}`, count);
                }
              }
              return records;
            }

            function computeDiff(oldMap, nextMap) {
              const allKeys = new Set([...oldMap.keys(), ...nextMap.keys()]);
              let updatedRecords = 0;
              let newDownloads = 0;
              let netDelta = 0;
              const touchedListings = new Set();

              for (const key of allKeys) {
                const previous = oldMap.get(key) ?? 0;
                const current = nextMap.get(key) ?? 0;
                if (previous === current) {
                  continue;
                }

                updatedRecords += 1;
                const [listingId] = key.split("@@");
                touchedListings.add(listingId);

                const delta = current - previous;
                if (delta > 0) {
                  newDownloads += delta;
                }
                netDelta += delta;
              }

              return {
                updatedRecords,
                newDownloads,
                netDelta,
                touchedListings: touchedListings.size,
              };
            }

            const mapsJson = readJson("maps/downloads.json");
            const modsJson = readJson("mods/downloads.json");
            const oldMaps = toRecordMap(readJson("/tmp/download-baseline/maps-downloads.json"));
            const newMaps = toRecordMap(mapsJson);
            const oldMods = toRecordMap(readJson("/tmp/download-baseline/mods-downloads.json"));
            const newMods = toRecordMap(modsJson);

            const mapStats = computeDiff(oldMaps, newMaps);
            const modStats = computeDiff(oldMods, newMods);
            const trackedListingsMaps = Object.keys(mapsJson).length;
            const trackedListingsMods = Object.keys(modsJson).length;

            const output = [
              `updated_records_maps=${mapStats.updatedRecords}`,
              `updated_records_mods=${modStats.updatedRecords}`,
              `updated_records_total=${mapStats.updatedRecords + modStats.updatedRecords}`,
              `new_downloads_maps=${mapStats.newDownloads}`,
              `new_downloads_mods=${modStats.newDownloads}`,
              `new_downloads_total=${mapStats.newDownloads + modStats.newDownloads}`,
              `net_delta_maps=${mapStats.netDelta}`,
              `net_delta_mods=${modStats.netDelta}`,
              `net_delta_total=${mapStats.netDelta + modStats.netDelta}`,
              `updated_listings_maps=${mapStats.touchedListings}`,
              `updated_listings_mods=${modStats.touchedListings}`,
              `updated_listings_total=${mapStats.touchedListings + modStats.touchedListings}`,
              `tracked_listings_maps=${trackedListingsMaps}`,
              `tracked_listings_mods=${trackedListingsMods}`,
              `tracked_listings_total=${trackedListingsMaps + trackedListingsMods}`,
              `tracked_versions_maps=${newMaps.size}`,
              `tracked_versions_mods=${newMods.size}`,
              `tracked_versions_total=${newMaps.size + newMods.size}`,
            ].join("\n");

            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${output}\n`);
          '

      - name: Stage changes
        id: stage_changes
        run: |
          git add maps/downloads.json mods/downloads.json maps/integrity.json mods/integrity.json maps/integrity-cache.json mods/integrity-cache.json maps/*/manifest.json maps/demand-stats-cache.json history/registry-download-attribution.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No registry analytics changes detected; skipping PR update."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update bot PR
        id: create_pr
        if: ${{ steps.stage_changes.outputs.has_changes == 'true' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate registry analytics"
          branch: bot/regenerate-registry-analytics
          delete-branch: true
          title: "chore: regenerate registry analytics"
          body: "Automated update from regenerate-registry-analytics workflow."

      - name: Finalize bot PR automation
        id: bot_pr
        if: ${{ steps.stage_changes.outputs.has_changes == 'true' }}
        uses: ./.github/actions/bot-pr-automation
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          bot_branch: bot/regenerate-registry-analytics
          pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
          pr_url: ${{ steps.create_pr.outputs.pull-request-url }}
          pr_head_sha: ${{ steps.create_pr.outputs.pull-request-head-sha }}
          source_workflow: ${{ github.workflow }}
          source_run_id: ${{ github.run_id }}

      - name: Finalize change outputs
        id: commit_changes
        run: |
          if [ "${{ steps.stage_changes.outputs.has_changes }}" != "true" ]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            echo "pull_request_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD_SHA="${{ steps.bot_pr.outputs.pr_head_sha }}"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "pull_request_url=${{ steps.bot_pr.outputs.pr_url }}" >> "$GITHUB_OUTPUT"

      - name: Notify Discord (Downloads + Integrity)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TITLE: Regenerate Registry Analytics (Downloads + Integrity)
          DISCORD_STATUS: ${{ job.status }}
          DISCORD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPDATED_RECORDS_TOTAL: ${{ steps.download_stats.outputs.updated_records_total }}
          UPDATED_LISTINGS_TOTAL: ${{ steps.download_stats.outputs.updated_listings_total }}
          NEW_DOWNLOADS_TOTAL: ${{ steps.download_stats.outputs.new_downloads_total }}
          NET_DELTA_TOTAL: ${{ steps.download_stats.outputs.net_delta_total }}
          UPDATED_RECORDS_MAPS: ${{ steps.download_stats.outputs.updated_records_maps }}
          NEW_DOWNLOADS_MAPS: ${{ steps.download_stats.outputs.new_downloads_maps }}
          NET_DELTA_MAPS: ${{ steps.download_stats.outputs.net_delta_maps }}
          UPDATED_RECORDS_MODS: ${{ steps.download_stats.outputs.updated_records_mods }}
          NEW_DOWNLOADS_MODS: ${{ steps.download_stats.outputs.new_downloads_mods }}
          NET_DELTA_MODS: ${{ steps.download_stats.outputs.net_delta_mods }}
          TRACKED_LISTINGS_TOTAL: ${{ steps.download_stats.outputs.tracked_listings_total }}
          TRACKED_LISTINGS_MAPS: ${{ steps.download_stats.outputs.tracked_listings_maps }}
          TRACKED_LISTINGS_MODS: ${{ steps.download_stats.outputs.tracked_listings_mods }}
          TRACKED_VERSIONS_TOTAL: ${{ steps.download_stats.outputs.tracked_versions_total }}
          TRACKED_VERSIONS_MAPS: ${{ steps.download_stats.outputs.tracked_versions_maps }}
          TRACKED_VERSIONS_MODS: ${{ steps.download_stats.outputs.tracked_versions_mods }}
          INTEGRITY_LISTINGS_MAPS: ${{ needs.generate-maps.outputs.integrity_listings }}
          INTEGRITY_LISTINGS_MODS: ${{ needs.generate-mods.outputs.integrity_listings }}
          INTEGRITY_VERSIONS_CHECKED_MAPS: ${{ needs.generate-maps.outputs.integrity_versions_checked }}
          INTEGRITY_VERSIONS_CHECKED_MODS: ${{ needs.generate-mods.outputs.integrity_versions_checked }}
          INTEGRITY_COMPLETE_VERSIONS_MAPS: ${{ needs.generate-maps.outputs.integrity_complete_versions }}
          INTEGRITY_COMPLETE_VERSIONS_MODS: ${{ needs.generate-mods.outputs.integrity_complete_versions }}
          INTEGRITY_INCOMPLETE_VERSIONS_MAPS: ${{ needs.generate-maps.outputs.integrity_incomplete_versions }}
          INTEGRITY_INCOMPLETE_VERSIONS_MODS: ${{ needs.generate-mods.outputs.integrity_incomplete_versions }}
          INTEGRITY_FILTERED_VERSIONS_MAPS: ${{ needs.generate-maps.outputs.integrity_filtered_versions }}
          INTEGRITY_FILTERED_VERSIONS_MODS: ${{ needs.generate-mods.outputs.integrity_filtered_versions }}
          INTEGRITY_CACHE_HITS_MAPS: ${{ needs.generate-maps.outputs.integrity_cache_hits }}
          INTEGRITY_CACHE_HITS_MODS: ${{ needs.generate-mods.outputs.integrity_cache_hits }}
          ATTR_FETCHES_MAPS: ${{ needs.generate-maps.outputs.registry_fetches_added }}
          ATTR_FETCHES_MODS: ${{ needs.generate-mods.outputs.registry_fetches_added }}
          ATTR_FETCHES_DEMAND: ${{ needs.generate-map-demand-stats.outputs.attribution_fetches_added }}
          ATTR_FETCHES_MERGED: ${{ steps.merge_attribution.outputs.registry_fetches_added_total }}
          ADJUSTED_DELTA_MAPS: ${{ needs.generate-maps.outputs.adjusted_delta_total }}
          ADJUSTED_DELTA_MODS: ${{ needs.generate-mods.outputs.adjusted_delta_total }}
          CLAMPED_VERSIONS_MAPS: ${{ needs.generate-maps.outputs.clamped_versions }}
          CLAMPED_VERSIONS_MODS: ${{ needs.generate-mods.outputs.clamped_versions }}
          MAP_WARNINGS_JSON: ${{ needs.generate-maps.outputs.warnings_json }}
          MOD_WARNINGS_JSON: ${{ needs.generate-mods.outputs.warnings_json }}
          COMMITTED: ${{ steps.commit_changes.outputs.committed }}
          COMMIT_SHA: ${{ steps.commit_changes.outputs.commit_sha }}
          PULL_REQUEST_URL: ${{ steps.commit_changes.outputs.pull_request_url }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          COMMIT_DISPLAY="none (no file changes)"
          if [ "${COMMITTED}" = "true" ]; then
            if [ -n "${PULL_REQUEST_URL}" ]; then
              COMMIT_DISPLAY="[bot PR](${PULL_REQUEST_URL})"
            elif [ -n "${COMMIT_SHA}" ]; then
              COMMIT_DISPLAY="\`${COMMIT_SHA}\`"
            fi
          fi

          MAP_WARNINGS_JSON_SAFE="${MAP_WARNINGS_JSON:-[]}"
          MOD_WARNINGS_JSON_SAFE="${MOD_WARNINGS_JSON:-[]}"
          export DISCORD_WARNINGS_JSON="$(jq -nc \
            --arg maps "${MAP_WARNINGS_JSON_SAFE}" \
            --arg mods "${MOD_WARNINGS_JSON_SAFE}" \
            '($maps | fromjson) + ($mods | fromjson)')"

          export DISCORD_LINES_JSON="$(jq -nc \
            --arg updated_records_total "${UPDATED_RECORDS_TOTAL}" \
            --arg updated_listings_total "${UPDATED_LISTINGS_TOTAL}" \
            --arg tracked_listings_total "${TRACKED_LISTINGS_TOTAL}" \
            --arg tracked_listings_maps "${TRACKED_LISTINGS_MAPS}" \
            --arg tracked_listings_mods "${TRACKED_LISTINGS_MODS}" \
            --arg tracked_versions_total "${TRACKED_VERSIONS_TOTAL}" \
            --arg tracked_versions_maps "${TRACKED_VERSIONS_MAPS}" \
            --arg tracked_versions_mods "${TRACKED_VERSIONS_MODS}" \
            --arg integrity_listings_maps "${INTEGRITY_LISTINGS_MAPS}" \
            --arg integrity_listings_mods "${INTEGRITY_LISTINGS_MODS}" \
            --arg integrity_versions_checked_maps "${INTEGRITY_VERSIONS_CHECKED_MAPS}" \
            --arg integrity_versions_checked_mods "${INTEGRITY_VERSIONS_CHECKED_MODS}" \
            --arg integrity_complete_versions_maps "${INTEGRITY_COMPLETE_VERSIONS_MAPS}" \
            --arg integrity_complete_versions_mods "${INTEGRITY_COMPLETE_VERSIONS_MODS}" \
            --arg integrity_incomplete_versions_maps "${INTEGRITY_INCOMPLETE_VERSIONS_MAPS}" \
            --arg integrity_incomplete_versions_mods "${INTEGRITY_INCOMPLETE_VERSIONS_MODS}" \
            --arg integrity_filtered_versions_maps "${INTEGRITY_FILTERED_VERSIONS_MAPS}" \
            --arg integrity_filtered_versions_mods "${INTEGRITY_FILTERED_VERSIONS_MODS}" \
            --arg integrity_cache_hits_maps "${INTEGRITY_CACHE_HITS_MAPS}" \
            --arg integrity_cache_hits_mods "${INTEGRITY_CACHE_HITS_MODS}" \
            --arg attr_fetches_maps "${ATTR_FETCHES_MAPS}" \
            --arg attr_fetches_mods "${ATTR_FETCHES_MODS}" \
            --arg attr_fetches_demand "${ATTR_FETCHES_DEMAND}" \
            --arg attr_fetches_merged "${ATTR_FETCHES_MERGED}" \
            --arg adjusted_delta_maps "${ADJUSTED_DELTA_MAPS}" \
            --arg adjusted_delta_mods "${ADJUSTED_DELTA_MODS}" \
            --arg clamped_versions_maps "${CLAMPED_VERSIONS_MAPS}" \
            --arg clamped_versions_mods "${CLAMPED_VERSIONS_MODS}" \
            --arg new_downloads_total "${NEW_DOWNLOADS_TOTAL}" \
            --arg net_delta_total "${NET_DELTA_TOTAL}" \
            --arg updated_records_maps "${UPDATED_RECORDS_MAPS}" \
            --arg new_downloads_maps "${NEW_DOWNLOADS_MAPS}" \
            --arg net_delta_maps "${NET_DELTA_MAPS}" \
            --arg updated_records_mods "${UPDATED_RECORDS_MODS}" \
            --arg new_downloads_mods "${NEW_DOWNLOADS_MODS}" \
            --arg net_delta_mods "${NET_DELTA_MODS}" \
            --arg commit_display "${COMMIT_DISPLAY}" \
            '[
              "- **Updated records:** \($updated_records_total)",
              "- **Listings touched:** \($updated_listings_total)",
              "- **Tracked listings:** \($tracked_listings_total) (maps \($tracked_listings_maps), mods \($tracked_listings_mods))",
              "- **Tracked versions:** \($tracked_versions_total) (maps \($tracked_versions_maps), mods \($tracked_versions_mods))",
              "- **Integrity listings:** maps \($integrity_listings_maps), mods \($integrity_listings_mods)",
              "- **Integrity versions checked:** maps \($integrity_versions_checked_maps), mods \($integrity_versions_checked_mods)",
              "- **Integrity complete/incomplete:** maps \($integrity_complete_versions_maps)/\($integrity_incomplete_versions_maps), mods \($integrity_complete_versions_mods)/\($integrity_incomplete_versions_mods)",
              "- **Integrity filtered versions:** maps \($integrity_filtered_versions_maps), mods \($integrity_filtered_versions_mods)",
              "- **Integrity cache hits:** maps \($integrity_cache_hits_maps), mods \($integrity_cache_hits_mods)",
              "- **Registry-attributed fetches added:** merged \($attr_fetches_merged) (maps \($attr_fetches_maps), mods \($attr_fetches_mods), demand \($attr_fetches_demand))",
              "- **Attribution subtraction this run:** maps \($adjusted_delta_maps), mods \($adjusted_delta_mods)",
              "- **Attribution-clamped versions:** maps \($clamped_versions_maps), mods \($clamped_versions_mods)",
              "- **New downloads:** +\($new_downloads_total)",
              "- **Net delta:** \($net_delta_total)",
              "- **Maps:** \($updated_records_maps) updated records, +\($new_downloads_maps) (net \($net_delta_maps))",
              "- **Mods:** \($updated_records_mods) updated records, +\($new_downloads_mods) (net \($net_delta_mods))",
              "- **Commit:** \($commit_display)"
            ]')"

          pnpm --dir scripts run notify-discord

      - name: Notify Discord (Mod Security Errors)
        if: ${{ always() && needs.generate-mods.outputs.security_error_count != '0' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TITLE: 🚨🚨 Registry Security Alerts (ERROR)
          DISCORD_STATUS: failure
          DISCORD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECURITY_ERROR_COUNT: ${{ needs.generate-mods.outputs.security_error_count }}
          SECURITY_ERRORS_JSON: ${{ needs.generate-mods.outputs.security_errors_json }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          export DISCORD_ERRORS_JSON="${SECURITY_ERRORS_JSON:-[]}"
          export DISCORD_LINES_JSON="$(jq -nc \
            --arg count "${SECURITY_ERROR_COUNT}" \
            '[ 
              "- **Affected latest mod versions:** \($count)",
              "- **Status:** hard-blocked from integrity completeness"
            ]')"

          pnpm --dir scripts run notify-discord

      - name: Notify Discord (Mod Security Warnings)
        if: ${{ always() && needs.generate-mods.outputs.security_warning_count != '0' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TITLE: ⚠️ Registry Security Alerts (WARNING)
          DISCORD_STATUS: warning
          DISCORD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECURITY_WARNING_COUNT: ${{ needs.generate-mods.outputs.security_warning_count }}
          SECURITY_WARNINGS_JSON: ${{ needs.generate-mods.outputs.security_warnings_json }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          export DISCORD_WARNINGS_JSON="${SECURITY_WARNINGS_JSON:-[]}"
          export DISCORD_LINES_JSON="$(jq -nc \
            --arg count "${SECURITY_WARNING_COUNT}" \
            '[ 
              "- **Affected latest mod versions:** \($count)",
              "- **Status:** warnings do not block integrity completeness"
            ]')"

          pnpm --dir scripts run notify-discord

      - name: Notify Discord (Map Demand Stats)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TITLE: Regenerate Registry Analytics (Map Demand Stats)
          DISCORD_STATUS: ${{ job.status }}
          DISCORD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PROCESSED_MAPS: ${{ needs.generate-map-demand-stats.outputs.processed_maps }}
          UPDATED_MAPS: ${{ needs.generate-map-demand-stats.outputs.updated_maps }}
          SKIPPED_MAPS: ${{ needs.generate-map-demand-stats.outputs.skipped_maps }}
          SKIPPED_UNCHANGED: ${{ needs.generate-map-demand-stats.outputs.skipped_unchanged }}
          EXTRACTION_FAILURES: ${{ needs.generate-map-demand-stats.outputs.extraction_failures }}
          RESIDENTS_DELTA_TOTAL: ${{ needs.generate-map-demand-stats.outputs.residents_delta_total }}
          GRAPHQL_QUERIES: ${{ needs.generate-map-demand-stats.outputs.graphql_queries }}
          GRAPHQL_TOTAL_COST: ${{ needs.generate-map-demand-stats.outputs.graphql_total_cost }}
          ATTR_FETCHES_DEMAND: ${{ needs.generate-map-demand-stats.outputs.attribution_fetches_added }}
          WARNINGS_JSON: ${{ needs.generate-map-demand-stats.outputs.warnings_json }}
          COMMITTED: ${{ steps.commit_changes.outputs.committed }}
          COMMIT_SHA: ${{ steps.commit_changes.outputs.commit_sha }}
          PULL_REQUEST_URL: ${{ steps.commit_changes.outputs.pull_request_url }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          COMMIT_DISPLAY="none (no file changes)"
          if [ "${COMMITTED}" = "true" ]; then
            if [ -n "${PULL_REQUEST_URL}" ]; then
              COMMIT_DISPLAY="[bot PR](${PULL_REQUEST_URL})"
            elif [ -n "${COMMIT_SHA}" ]; then
              COMMIT_DISPLAY="\`${COMMIT_SHA}\`"
            fi
          fi

          export DISCORD_WARNINGS_JSON="${WARNINGS_JSON:-[]}"

          export DISCORD_LINES_JSON="$(jq -nc \
            --arg processed_maps "${PROCESSED_MAPS}" \
            --arg updated_maps "${UPDATED_MAPS}" \
            --arg skipped_maps "${SKIPPED_MAPS}" \
            --arg skipped_unchanged "${SKIPPED_UNCHANGED}" \
            --arg extraction_failures "${EXTRACTION_FAILURES}" \
            --arg residents_delta_total "${RESIDENTS_DELTA_TOTAL}" \
            --arg graphql_queries "${GRAPHQL_QUERIES}" \
            --arg graphql_total_cost "${GRAPHQL_TOTAL_COST}" \
            --arg attr_fetches_demand "${ATTR_FETCHES_DEMAND}" \
            --arg commit_display "${COMMIT_DISPLAY}" \
            '[
              "- **Processed maps:** \($processed_maps)",
              "- **Manifests updated:** \($updated_maps)",
              "- **Skipped maps:** \($skipped_maps)",
              "- **Skipped unchanged (sha match or <9h):** \($skipped_unchanged)",
              "- **Extraction failures:** \($extraction_failures)",
              "- **Residents total delta:** \($residents_delta_total)",
              "- **GraphQL usage:** queries=\($graphql_queries), totalCost=\($graphql_total_cost)",
              "- **Registry-attributed fetches added:** \($attr_fetches_demand)",
              "- **Commit:** \($commit_display)"
            ]')"

          pnpm --dir scripts run notify-discord
