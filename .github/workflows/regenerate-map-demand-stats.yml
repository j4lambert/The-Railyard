name: Regenerate Map Demand Stats

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-map-demand-stats
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Regenerate map demand stats
        id: regenerate_stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --dir scripts run generate-map-demand-stats

      - name: Commit changes
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maps/*/manifest.json maps/demand-stats-cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No map demand stat changes detected; skipping commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: regenerate map demand stats"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TITLE: Regenerate Map Demand Stats
          DISCORD_STATUS: ${{ job.status }}
          DISCORD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PROCESSED_MAPS: ${{ steps.regenerate_stats.outputs.processed_maps }}
          UPDATED_MAPS: ${{ steps.regenerate_stats.outputs.updated_maps }}
          SKIPPED_MAPS: ${{ steps.regenerate_stats.outputs.skipped_maps }}
          SKIPPED_UNCHANGED: ${{ steps.regenerate_stats.outputs.skipped_unchanged }}
          EXTRACTION_FAILURES: ${{ steps.regenerate_stats.outputs.extraction_failures }}
          RESIDENTS_DELTA_TOTAL: ${{ steps.regenerate_stats.outputs.residents_delta_total }}
          GRAPHQL_QUERIES: ${{ steps.regenerate_stats.outputs.graphql_queries }}
          GRAPHQL_TOTAL_COST: ${{ steps.regenerate_stats.outputs.graphql_total_cost }}
          WARNINGS_JSON: ${{ steps.regenerate_stats.outputs.warnings_json }}
          COMMITTED: ${{ steps.commit_changes.outputs.committed }}
          COMMIT_SHA: ${{ steps.commit_changes.outputs.commit_sha }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          COMMIT_DISPLAY="none (no file changes)"
          if [ "${COMMITTED}" = "true" ] && [ -n "${COMMIT_SHA}" ]; then
            COMMIT_DISPLAY="\`${COMMIT_SHA}\`"
          fi

          export DISCORD_WARNINGS_JSON="${WARNINGS_JSON:-[]}"

          export DISCORD_LINES_JSON="$(jq -nc \
            --arg processed_maps "${PROCESSED_MAPS}" \
            --arg updated_maps "${UPDATED_MAPS}" \
            --arg skipped_maps "${SKIPPED_MAPS}" \
            --arg skipped_unchanged "${SKIPPED_UNCHANGED}" \
            --arg extraction_failures "${EXTRACTION_FAILURES}" \
            --arg residents_delta_total "${RESIDENTS_DELTA_TOTAL}" \
            --arg graphql_queries "${GRAPHQL_QUERIES}" \
            --arg graphql_total_cost "${GRAPHQL_TOTAL_COST}" \
            --arg commit_display "${COMMIT_DISPLAY}" \
            '[
              "- **Processed maps:** \($processed_maps)",
              "- **Manifests updated:** \($updated_maps)",
              "- **Skipped maps:** \($skipped_maps)",
              "- **Skipped unchanged (sha match or <9h):** \($skipped_unchanged)",
              "- **Extraction failures:** \($extraction_failures)",
              "- **Residents total delta:** \($residents_delta_total)",
              "- **GraphQL usage:** queries=\($graphql_queries), totalCost=\($graphql_total_cost)",
              "- **Commit:** \($commit_display)"
            ]')"

          pnpm --dir scripts run notify-discord
