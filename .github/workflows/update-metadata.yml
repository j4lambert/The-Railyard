name: Update Listing Metadata

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-mod:
    if: contains(github.event.issue.labels.*.name, 'update-mod')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Parse issue body
        id: parser
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/update-mod.yml
          issue-body: ${{ github.event.issue.body }}

      - name: Validate update
        env:
          LISTING_TYPE: mod
          ISSUE_JSON: ${{ steps.parser.outputs.jsonString }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --dir scripts run validate-update

      - name: Update listing
        env:
          LISTING_TYPE: mod
          ISSUE_JSON: ${{ steps.parser.outputs.jsonString }}
        run: pnpm --dir scripts run update-listing

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(mod): update ${{ fromJson(steps.parser.outputs.jsonString).mod-id }} metadata"
          title: "fix(mod): update `${{ fromJson(steps.parser.outputs.jsonString).mod-id }}` metadata"
          body: |
            Fixes #${{ github.event.issue.number }}

            Automated PR to update mod `${{ fromJson(steps.parser.outputs.jsonString).mod-id }}` metadata.

            Submitted by @${{ github.event.issue.user.login }}
          branch: update/mod/${{ fromJson(steps.parser.outputs.jsonString).mod-id }}
          labels: automated-pr

      - name: Comment on issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'A pull request has been created for your metadata update. A maintainer will review it shortly.'
            });

      - name: Handle validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errorMsg = 'Your update request failed validation. Please check the workflow logs for details.';
            try {
              errorMsg = fs.readFileSync('validation-error.md', 'utf-8');
            } catch {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: errorMsg
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });

  update-map:
    if: contains(github.event.issue.labels.*.name, 'update-map')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Parse issue body
        id: parser
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/update-map.yml
          issue-body: ${{ github.event.issue.body }}

      - name: Validate update
        env:
          LISTING_TYPE: map
          ISSUE_JSON: ${{ steps.parser.outputs.jsonString }}
          ISSUE_AUTHOR_ID: ${{ github.event.issue.user.id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --dir scripts run validate-update

      - name: Update listing
        env:
          LISTING_TYPE: map
          ISSUE_JSON: ${{ steps.parser.outputs.jsonString }}
        run: pnpm --dir scripts run update-listing

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(map): update ${{ fromJson(steps.parser.outputs.jsonString).map-id }} metadata"
          title: "fix(map): update `${{ fromJson(steps.parser.outputs.jsonString).map-id }}` metadata"
          body: |
            Fixes #${{ github.event.issue.number }}

            Automated PR to update map `${{ fromJson(steps.parser.outputs.jsonString).map-id }}` metadata.

            Submitted by @${{ github.event.issue.user.login }}
          branch: update/map/${{ fromJson(steps.parser.outputs.jsonString).map-id }}
          labels: automated-pr

      - name: Comment on issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'A pull request has been created for your metadata update. A maintainer will review it shortly.'
            });

      - name: Handle validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errorMsg = 'Your update request failed validation. Please check the workflow logs for details.';
            try {
              errorMsg = fs.readFileSync('validation-error.md', 'utf-8');
            } catch {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: errorMsg
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });
