name: Cache Download History

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cache-download-history
  cancel-in-progress: false

jobs:
  cache-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/pnpm-lock.yaml

      - name: Install script dependencies
        run: pnpm install --frozen-lockfile
        working-directory: scripts

      - name: Generate download history snapshot
        id: generate_history
        run: pnpm --dir scripts run generate-download-history

      - name: Generate analytics CSVs
        run: pnpm --dir scripts run analytics

      - name: Stage snapshot changes
        id: commit_changes
        run: |
          git add history/snapshot_*.json analytics/*.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No history snapshot/analytics changes detected; skipping PR update."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            echo "pull_request_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update bot PR
        id: create_pr
        if: ${{ steps.commit_changes.outputs.committed == 'true' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: cache download history snapshot"
          branch: bot/cache-download-history
          delete-branch: true
          title: "chore: cache download history snapshot"
          body: "Automated update from cache-download-history workflow."

      - name: Resolve bot PR outputs with retries
        id: resolve_pr
        if: ${{ steps.commit_changes.outputs.committed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          retry_cmd() {
            local max_attempts="$1"
            shift
            local delay=5
            local attempt=1
            local output=""
            while true; do
              if output="$("$@" 2>&1)"; then
                printf '%s' "$output"
                return 0
              fi
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "$output" >&2
                return "$status"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed for: $*" >&2
              echo "$output" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          PR_NUMBER="${{ steps.create_pr.outputs.pull-request-number }}"
          PR_URL="${{ steps.create_pr.outputs.pull-request-url }}"
          PR_HEAD_SHA="${{ steps.create_pr.outputs.pull-request-head-sha }}"
          BOT_BRANCH="bot/cache-download-history"

          if [ -z "${PR_NUMBER}" ]; then
            PR_LIST_JSON="$(retry_cmd 5 gh pr list --repo "${{ github.repository }}" --head "${BOT_BRANCH}" --state open --json number,url,headRefOid --limit 1)"
            PR_NUMBER="$(echo "${PR_LIST_JSON}" | jq -r '.[0].number // empty')"
            PR_URL="$(echo "${PR_LIST_JSON}" | jq -r '.[0].url // empty')"
            PR_HEAD_SHA="$(echo "${PR_LIST_JSON}" | jq -r '.[0].headRefOid // empty')"
          fi

          if [ -z "${PR_NUMBER}" ]; then
            echo "Unable to resolve PR number for branch '${BOT_BRANCH}'." >&2
            exit 1
          fi

          if [ -z "${PR_URL}" ] || [ -z "${PR_HEAD_SHA}" ]; then
            PR_VIEW_JSON="$(retry_cmd 5 gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json url,headRefOid)"
            PR_URL="${PR_URL:-$(echo "${PR_VIEW_JSON}" | jq -r '.url // empty')}"
            PR_HEAD_SHA="${PR_HEAD_SHA:-$(echo "${PR_VIEW_JSON}" | jq -r '.headRefOid // empty')}"
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "pr_head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Apply automation label with retries
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          retry_run() {
            local max_attempts="$1"
            shift
            local delay=5
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed for: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          retry_run 5 gh pr edit "${{ steps.resolve_pr.outputs.pr_number }}" --repo "${{ github.repository }}" --add-label automation

      - name: Request approval bot review
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          retry_run() {
            local max_attempts="$1"
            shift
            local delay=5
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed for: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          retry_run 5 gh api repos/${{ github.repository }}/dispatches \
            -f event_type='auto-approve-actions-bot-pr' \
            -f client_payload[pull_request_number]="${{ steps.resolve_pr.outputs.pr_number }}" \
            -f client_payload[source_workflow]="${{ github.workflow }}" \
            -f client_payload[source_run_id]="${{ github.run_id }}"

      - name: Enable PR auto-merge
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          retry_run() {
            local max_attempts="$1"
            shift
            local delay=5
            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              echo "Attempt ${attempt}/${max_attempts} failed for: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          retry_run 5 gh pr merge "${{ steps.resolve_pr.outputs.pr_number }}" --repo "${{ github.repository }}" --auto --squash \
            || echo "Could not enable auto-merge after retries (auto-merge may be disabled or blocked by branch rules)."

      - name: Finalize change outputs
        id: finalize_changes
        run: |
          if [ "${{ steps.commit_changes.outputs.committed }}" != "true" ]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            echo "pull_request_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD_SHA="${{ steps.resolve_pr.outputs.pr_head_sha }}"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "pull_request_url=${{ steps.resolve_pr.outputs.pr_url }}" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TITLE: Cache Download History
          DISCORD_STATUS: ${{ job.status }}
          DISCORD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SNAPSHOT_FILE: ${{ steps.generate_history.outputs.snapshot_file }}
          PREVIOUS_SNAPSHOT_FILE: ${{ steps.generate_history.outputs.previous_snapshot_file }}
          MAPS_TOTAL_DOWNLOADS: ${{ steps.generate_history.outputs.maps_total_downloads }}
          MAPS_NET_DOWNLOADS: ${{ steps.generate_history.outputs.maps_net_downloads }}
          MAPS_ENTRIES: ${{ steps.generate_history.outputs.maps_entries }}
          MODS_TOTAL_DOWNLOADS: ${{ steps.generate_history.outputs.mods_total_downloads }}
          MODS_NET_DOWNLOADS: ${{ steps.generate_history.outputs.mods_net_downloads }}
          MODS_ENTRIES: ${{ steps.generate_history.outputs.mods_entries }}
          WARNINGS_JSON: ${{ steps.generate_history.outputs.warnings_json }}
          COMMITTED: ${{ steps.finalize_changes.outputs.committed }}
          COMMIT_SHA: ${{ steps.finalize_changes.outputs.commit_sha }}
          PULL_REQUEST_URL: ${{ steps.finalize_changes.outputs.pull_request_url }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi

          COMMIT_DISPLAY="none (no file changes)"
          if [ "${COMMITTED}" = "true" ]; then
            if [ -n "${PULL_REQUEST_URL}" ]; then
              COMMIT_DISPLAY="[bot PR](${PULL_REQUEST_URL})"
            elif [ -n "${COMMIT_SHA}" ]; then
              COMMIT_DISPLAY="\`${COMMIT_SHA}\`"
            fi
          fi
          PREVIOUS_DISPLAY="${PREVIOUS_SNAPSHOT_FILE:-none}"

          export DISCORD_WARNINGS_JSON="${WARNINGS_JSON:-[]}"
          export DISCORD_LINES_JSON="$(jq -nc \
            --arg snapshot_file "${SNAPSHOT_FILE}" \
            --arg previous_snapshot_file "${PREVIOUS_DISPLAY}" \
            --arg maps_total "${MAPS_TOTAL_DOWNLOADS}" \
            --arg maps_net "${MAPS_NET_DOWNLOADS}" \
            --arg maps_entries "${MAPS_ENTRIES}" \
            --arg mods_total "${MODS_TOTAL_DOWNLOADS}" \
            --arg mods_net "${MODS_NET_DOWNLOADS}" \
            --arg mods_entries "${MODS_ENTRIES}" \
            --arg commit_display "${COMMIT_DISPLAY}" \
            '[
              "- **Snapshot:** \($snapshot_file)",
              "- **Previous snapshot:** \($previous_snapshot_file)",
              "- **Maps:** total=\($maps_total), net=\($maps_net), entries=\($maps_entries)",
              "- **Mods:** total=\($mods_total), net=\($mods_net), entries=\($mods_entries)",
              "- **Commit:** \($commit_display)"
            ]')"

          pnpm --dir scripts run notify-discord
